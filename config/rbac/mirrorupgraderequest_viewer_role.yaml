# This rule is not used by the project accord itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to ops.accord.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: accord
    app.kubernetes.io/managed-by: kustomize
  name: mirrorupgraderequest-viewer-role
rules:
- apiGroups:
  - ops.accord.io
  resources:
  - mirrorupgraderequests
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ops.accord.io
  resources:
  - mirrorupgraderequests/status
  verbs:
  - get
